# Netlify configuration for Pixcards (Next.js)
# Explicitly enable the Next.js runtime — a custom build command can suppress
# Netlify's framework auto-detection, which otherwise leaves routes unserved.
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  # Generate the Prisma client; sync the schema (and optionally seed demo data
  # when SEED_DEMO=true) only when a database is configured; make sure sharp's
  # Linux binaries exist even when this build runs on a Mac (local `netlify
  # deploy --build`); then build.
  command = "prisma generate && bash scripts/netlify-db.sh && node scripts/ensure-linux-sharp.mjs && next build"
  # The Next.js runtime requires the publish dir to be .next (not the repo root).
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  # Prisma + Next on Netlify
  NEXT_TELEMETRY_DISABLED = "1"
  # These env vars are NOT secrets (a bucket name + public URLs that are meant
  # to ship in the client bundle), so exclude them from Netlify's secret scan.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_STORAGE_BUCKET,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_APP_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,EMAIL_FROM,EMAIL_REPLY_TO"

# Required environment variables (set in Netlify UI → Site settings → Environment):
#   DATABASE_URL          Supabase pooled URL (port 6543, ?pgbouncer=true)
#   DIRECT_URL            Supabase direct URL (port 5432) — used by db push
#   AUTH_SECRET           openssl rand -base64 32
#   NEXT_PUBLIC_APP_URL   https://pixcards.co.uk  (your live domain — used for
#                         QR codes, share links, emails and wallet passes)
# Optional:
#   ADMIN_EMAIL           email that becomes admin on sign-up (else first user)
#                         (alex@pixcards.app / admin@pixcards.app, password123)
# Optional — Supabase Storage for uploads (omit → inline data-URI uploads):
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#   SUPABASE_SERVICE_ROLE_KEY, SUPABASE_STORAGE_BUCKET
# Optional — Stripe (omit → demo mode):
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
#   NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY, STRIPE_PRO_PRICE_ID
